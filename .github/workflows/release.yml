name: Release
on:
  push:
    tags:
      - "*"
jobs:
  github:
    name: GitHub
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Make a release note
        id: note
        run: |
          #!ruby
          note = File.read("NEWS.md")[/^## (.*)\n++\K(?m:.*?)(?=\n## |\z)/]
          version = $1
          File.write("release-note.md", note)
          File.write(ENV['GITHUB_ENV'], "release_title=stringio #{version}", mode: "a")
        shell: ruby {0}
      - name: Create a release
        run: >-
          gh release create ${GITHUB_REF_NAME}
          --discussion-category Announcements
          --notes-file release-note.md
          --title "$release_title"
        env:
          GH_TOKEN: ${{ github.token }}

  rubygems:
    name: RubyGems
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
    environment: release
    strategy:
      matrix:
        ruby:
          - ruby
          - jruby
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Build
        run: |
          bundle exec rake compile
      - uses: rubygems/configure-rubygems-credentials@v1.0.0
      - name: Push gems
        run: |
          bundle exec rake release:rubygem_push
